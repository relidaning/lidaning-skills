services:
  chromadb:
    image: chromadb/chroma:0.6.3
    volumes:
      - ./data/chroma:/chroma/chroma
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rag-mcp:
    build: ./rag-mcp
    network_mode: host
    environment:
      - CHROMA_HOST=localhost
      - CHROMA_PORT=8000
      - OBSIDIAN_URL=http://127.0.0.1:27123
      - OBSIDIAN_TOKEN=${OBSIDIAN_MCP_TOKEN}
      - TZ=Asia/Shanghai
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped
