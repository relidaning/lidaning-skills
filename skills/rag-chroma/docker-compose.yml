services:
  chromadb:
    image: chromadb/chroma:0.6.3
    volumes:
      - ./data/chroma:/chroma/chroma
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-mcp:
    build: ./rag-mcp
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    ports:
      - "8081:8081"
    depends_on:
      chromadb:
        condition: service_healthy
